<!DOCTYPE HTML>
<html>
	<head>
		<title>Akce | Heja Boys</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
		<link rel="icon" type="image/x-icon" href="images/favicon.ico">
		<style>
			.akce-list {
				list-style: none;
				padding: 0;
			}
			.akce-item {
				background: rgba(255,255,255,0.03);
				padding: 1.5em;
				border-radius: 10px;
				margin-bottom: 1em;
				border: 1px solid rgba(255,255,255,0.08);
			}
			.akce-item strong {
				display: block;
				margin-bottom: 0.5em;
				font-size: 1.1em;
			}
			.akce-meta {
				opacity: 0.8;
				font-size: 0.9em;
				margin: 0.25em 0;
			}
			.akce-popis {
				margin-top: 0.75em;
				opacity: 0.9;
			}
		</style>
	</head>
	<body class="is-preload">
		<div id="wrapper">
			<header id="header">
				<div class="inner">
					<a href="index.html" class="logo">
						<span class="symbol"><img src="images/logoFull.jpg" alt="" /></span><span class="title">Heja
                        Boys</span>
					</a>
					<nav>
						<ul>
							<li><a href="#menu">Menu</a></li>
						</ul>
					</nav>
				</div>
			</header>

			<nav id="menu">
				<h2>Menu</h2>
				<ul>
					<li><a href="index.html">Domů</a></li>
					<li><a href="aktuality.html">Aktuality</a></li>
					<li><a href="akce.html">Akce</a></li>
					<li><a href="alba.html">Alba</a></li>
					<li><a href="merch.html">Merch</a></li>
					<li><a href="onas.html">O nás</a></li>
					<li><a href="pichejte-nas.html">Píchejte nás</a></li>
				</ul>
			</nav>

			<div id="main">
				<div class="inner">
					<h1>Akce</h1>
					<p>Všechny zveřejněné akce jsou zde.</p>

					<section>
						<h2>Současné akce</h2>
						<ul id="current-akce" class="akce-list">
							<li><p>Načítám...</p></li>
						</ul>
					</section>

					<section>
						<h2>Minulé akce</h2>
						<ul id="past-akce" class="akce-list alt">
							<li><p>Načítám...</p></li>
						</ul>
					</section>
				</div>
			</div>
		</div>

		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/util.js"></script>
		<script src="assets/js/main.js"></script>
		<script src="assets/js/footer.js"></script>

		<script>
			const API = 'https://hejaboys.pythonanywhere.com/api/akce?public=true';

			loadAkce();

			function isPublicEvent(a) {
				return Number(a.public) === 1;
			}

			function toEventDate(a) {
				return new Date(`${a.datum}T${a.cas || '23:59'}`);
			}

			function loadAkce() {
				fetch(API)
					.then(r => r.json())
					.then(data => {
						const now = new Date();
						const current = [];
						const past = [];

						data
							.filter(isPublicEvent)
							.forEach(a => {
								const d = toEventDate(a);
								if (d >= now) current.push(a);
								else past.push(a);
							});

						renderAkce('current-akce', current);
						renderAkce('past-akce', past);
					})
					.catch(() => {
						document.getElementById('current-akce').innerHTML = '<li><p>Chyba načítání</p></li>';
						document.getElementById('past-akce').innerHTML = '<li><p>Zkuste to prosím později.</p></li>';
					});
			}

			function renderAkce(id, data) {
				const container = document.getElementById(id);
				if (data.length === 0) {
					container.innerHTML = '<li><p>Žádné akce</p></li>';
					return;
				}

				container.innerHTML = data.map(a => `
					<li class="akce-item">
						<strong>${a.nazev}</strong>
						<div class="akce-meta">📅 ${formatDate(a.datum)}${a.cas ? ' v ' + a.cas : ''}</div>
						${a.misto ? '<div class="akce-meta">📍 ' + a.misto + '</div>' : ''}
						${a.popis ? '<div class="akce-popis">' + parseLinks(a.popis) + '</div>' : ''}
					</li>
				`).join('');
			}

			function formatDate(d) {
				return new Date(`${d}T00:00`).toLocaleDateString('cs-CZ');
			}

			function parseLinks(text) {
				if (!text) return '';
				const urlRegex = /(https?:\/\/[^\s]+)/g;
				return text.replace(urlRegex, url => {
					const safeLabel = url.length > 48 ? `${url.slice(0, 45)}…` : url;
					return `<a href="${url}" target="_blank" rel="noopener noreferrer" style="word-break: break-word; overflow-wrap: anywhere;">${safeLabel}</a>`;
				});
			}
		</script>
	</body>
</html>

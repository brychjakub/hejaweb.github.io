name: Update Spendee balance in PythonAnywhere

on:
  workflow_dispatch:
  schedule:
    - cron: "30 12 * * *"

jobs:
  update-spendee-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-spendee.txt

      - name: Update PythonAnywhere backend
        env:
          SPENDEE_TOKEN: ${{ secrets.SPENDEE_TOKEN }}
          SPENDEE_TOKEN_URL: ${{ secrets.SPENDEE_TOKEN_URL }}
          SPENDEE_REFRESH_TOKEN: ${{ secrets.SPENDEE_REFRESH_TOKEN }}
          SPENDEE_CLIENT_ID: ${{ secrets.SPENDEE_CLIENT_ID }}
          SPENDEE_CLIENT_SECRET: ${{ secrets.SPENDEE_CLIENT_SECRET }}
          SPENDEE_TOKEN_AUTH_MODE: ${{ secrets.SPENDEE_TOKEN_AUTH_MODE }}
          SPENDEE_DEVICE_UUID: ${{ secrets.SPENDEE_DEVICE_UUID }}
          SPENDEE_WALLET_ID: ${{ secrets.SPENDEE_WALLET_ID }}
          BACKEND_API_BASE: ${{ secrets.BACKEND_API_BASE }}
          BACKEND_USERNAME: ${{ secrets.BACKEND_USERNAME }}
          BACKEND_PASSWORD: ${{ secrets.BACKEND_PASSWORD }}
        run: python scripts/update_spendee_backend.py

name: Update Spendee balance in Google Sheets

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  update-spendee-sheet:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-spendee.txt

      - name: Update Google Sheet
        env:
          SPENDEE_TOKEN: ${{ secrets.SPENDEE_TOKEN }}
          SPENDEE_DEVICE_UUID: ${{ secrets.SPENDEE_DEVICE_UUID }}
          SPENDEE_WALLET_ID: ${{ secrets.SPENDEE_WALLET_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/update_spendee_google_sheet.py

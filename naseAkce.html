<script>
const API = 'https://hejaboys.pythonanywhere.com/api/akce';
let editingId = null;

loadAkce();

// =====================
// LOAD
// =====================
function loadAkce() {
  fetch(API)
    .then(r => r.json())
    .then(data => {

      const now = new Date();

      const future = [];
      const past = [];

      data.forEach(a => {
        const d = new Date(a.datum + ' ' + (a.cas || '00:00'));
        if (d >= now) future.push(a);
        else past.push(a);
      });

      renderList('future-list', future);
      renderList('past-list', past);
    })
    .catch(err => {
      console.error('Chyba načítání:', err);
    });
}

// =====================
// RENDER
// =====================
function renderList(id, data) {
  const container = document.getElementById(id);
  container.innerHTML = '';

  if (data.length === 0) {
    container.innerHTML = '<p>Žádné akce</p>';
    return;
  }

  data.forEach(a => {
    const div = document.createElement('div');
    div.className = 'akce-card';

    div.innerHTML = `
      <div class="akce-header">
        <div class="akce-title">${a.nazev}</div>
        <div class="akce-date">
          ${formatDate(a.datum)} ${a.cas ? 'v ' + a.cas : ''}
        </div>
      </div>

      <div class="akce-meta">
        ${a.misto ? '📍 ' + a.misto : ''}
      </div>

      <div>${a.popis || ''}</div>

      <div class="akce-actions">
        <button class="edit-btn">Upravit</button>
        <button class="delete-btn">Smazat</button>
      </div>
    `;

    div.querySelector('.edit-btn').addEventListener('click', () => editAkce(a));
    div.querySelector('.delete-btn').addEventListener('click', () => deleteAkce(a.id));

    container.appendChild(div);
  });
}

// =====================
// SUBMIT
// =====================
document.getElementById('akce-form').addEventListener('submit', e => {
  e.preventDefault();

  const data = {
    nazev: document.getElementById('nazev').value,
    datum: document.getElementById('datum').value,
    cas: document.getElementById('cas').value,
    misto: document.getElementById('misto').value,
    popis: document.getElementById('popis').value
  };

  const method = editingId ? 'PUT' : 'POST';
  const url = editingId ? `${API}/${editingId}` : API;

  fetch(url, {
    method: method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  })
  .then(() => {
    e.target.reset();
    editingId = null;

    document.getElementById('edit-info').style.display = 'none';
    document.getElementById('submit-btn').textContent = 'Uložit akci';

    loadAkce();
  })
  .catch(err => {
    console.error('Chyba ukládání:', err);
  });
});

// =====================
// EDIT
// =====================
function editAkce(a) {
  editingId = a.id;

  document.getElementById('nazev').value = a.nazev;
  document.getElementById('datum').value = a.datum;
  document.getElementById('cas').value = a.cas || '';
  document.getElementById('misto').value = a.misto || '';
  document.getElementById('popis').value = a.popis || '';

  document.getElementById('edit-info').style.display = 'block';
  document.getElementById('submit-btn').textContent = 'Uložit změny';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// =====================
// DELETE
// =====================
function deleteAkce(id) {
  if (!confirm('Opravdu smazat?')) return;

  fetch(`${API}/${id}`, { method: 'DELETE' })
    .then(() => loadAkce())
    .catch(err => {
      console.error('Chyba mazání:', err);
    });
}

// =====================
// FORMAT
// =====================
function formatDate(d) {
  return new Date(d).toLocaleDateString('cs-CZ');
}
</script>

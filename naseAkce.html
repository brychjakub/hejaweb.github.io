<!DOCTYPE HTML>

<html lang="cs">
<head>
  <title>Naše akce | Heja Boys</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">

  <style>
    /* ===== layout fix (override template) ===== */
    #wrapper > * > .inner {
      max-width: 800px !important;
      margin: 0 auto;
    }

    /* ===== cards ===== */
    .akce-card {
      background: rgba(255,255,255,0.03);
      padding: 1.5em;
      border-radius: 10px;
      margin-bottom: 1.5em;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .akce-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5em;
    }

    .akce-title {
      font-size: 1.3em;
      font-weight: bold;
    }

    .akce-date {
      font-size: 0.9em;
      opacity: 0.7;
    }

    .akce-meta {
      margin-bottom: 0.5em;
      opacity: 0.8;
    }

    .akce-status {
      margin-bottom: 0.75em;
      font-size: 0.95em;
      opacity: 0.95;
    }

    .akce-status.public {
      color: #00ff64;
    }

    .akce-status.private {
      color: #ffcc00;
    }

    .akce-actions {
      margin-top: 1em;
      display: flex;
      gap: 0.5em;
      flex-wrap: wrap;
    }

    .section-title {
      margin-top: 2em;
      margin-bottom: 1em;
      font-size: 1.2em;
      opacity: 0.8;
    }

    #edit-info {
      margin-bottom: 1em;
      font-weight: bold;
      color: #ffcc00;
    }

    button {
      padding: 0.5em 1em;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: #fff;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.4);
    }

    .publish-btn {
      background: rgba(0, 200, 100, 0.2);
      border-color: rgba(0, 200, 100, 0.5);
    }

    .publish-btn:hover {
      background: rgba(0, 200, 100, 0.3);
    }

    .publish-btn.published {
      background: rgba(0, 255, 100, 0.3);
      border-color: rgba(0, 255, 100, 0.7);
      color: #00ff64;
    }
  </style>

</head>

<body class="is-preload">
<div id="wrapper">

<header id="header">
  <div class="inner">
    <a href="index.html" class="logo">
      <span class="symbol"><img src="images/logoFull.jpg" alt=""></span>
      <span class="title">Heja Boys</span>
    </a>
  </div>
</header>

<div id="main">
  <div class="inner">


<h1>Naše akce</h1>
    <p>Je to od nejbližších akcí dál, ty co už byly jsou dolu, upravovat může každej tak žádný pičoviny...prosím</p>

<!-- FORM -->
<section>
  <h2>Přidat / upravit akci</h2>

  <p id="edit-info" style="display:none;">
    ✏️ Upravuji existující akci
  </p>

  <form id="akce-form">
    <input type="text" id="nazev" placeholder="Název" required>
    <input type="date" id="datum" required>
    <input type="time" id="cas">
    <input type="text" id="misto" placeholder="Místo">
    <textarea id="popis" placeholder="Popis"></textarea>
    <button type="submit" id="submit-btn">Uložit akci</button>
  </form>
</section>

<hr>

<!-- LIST -->
<section>
  <div class="section-title">📅 Nadcházející akce</div>
  <div id="future-list"></div>

  <div class="section-title">📁 Proběhlé akce</div>
  <div id="past-list"></div>
</section>

  </div>
</div>

</div>

<!-- TEMPLATE SCRIPTS -->

<script src="assets/js/jquery.min.js"></script>

<script src="assets/js/browser.min.js"></script>

<script src="assets/js/breakpoints.min.js"></script>

<script src="assets/js/util.js"></script>

<script src="assets/js/main.js"></script>
<script src="assets/js/footer.js"></script>

<!-- APP SCRIPT -->

<script>
const API = 'https://hejaboys.pythonanywhere.com/api/akce';
let editingId = null;
let editingPublic = 0;

loadAkce();

function isPublicEvent(a) {
  return Number(a.public) === 1;
}

function toEventDate(a) {
  return new Date(`${a.datum}T${a.cas || '23:59'}`);
}

function resetFormState(form) {
  form.reset();
  editingId = null;
  editingPublic = 0;

  document.getElementById('edit-info').style.display = 'none';
  document.getElementById('submit-btn').textContent = 'Uložit akci';
}

// =====================
// LOAD
// =====================
function loadAkce() {
  fetch(API)
    .then(r => r.json())
    .then(data => {

      const now = new Date();

      const future = [];
      const past = [];

      data.forEach(a => {
        const d = toEventDate(a);
        if (d >= now) future.push(a);
        else past.push(a);
      });

      renderList('future-list', future);
      renderList('past-list', past);
    })
    .catch(err => {
      console.error('Chyba načítání:', err);
    });
}

// =====================
// RENDER
// =====================
function renderList(id, data) {
  const container = document.getElementById(id);
  container.innerHTML = '';

  if (data.length === 0) {
    container.innerHTML = '<p>Žádné akce</p>';
    return;
  }

  data.forEach(a => {
    const div = document.createElement('div');
    div.className = 'akce-card';

    const isPublic = isPublicEvent(a);

    div.innerHTML = `
      <div class="akce-header">
        <div class="akce-title">${a.nazev}</div>
        <div class="akce-date">
          ${formatDate(a.datum)} ${a.cas ? 'v ' + a.cas : ''}
        </div>
      </div>

      <div class="akce-meta">
        ${a.misto ? '📍 ' + a.misto : ''}
      </div>

      <div class="akce-status ${isPublic ? 'public' : 'private'}">
        ${isPublic ? '🌍 Veřejná akce' : '🔒 Interní akce'}
      </div>

      <div>${a.popis || ''}</div>

      <div class="akce-actions">
	<button class="publish-btn ${isPublic ? 'published' : ''}" data-id="${a.id}" data-public="${isPublic ? 1 : 0}">
  ${isPublic ? '✓ Zveřejněná' : '🔒 Zveřejnit'}
</button>
        <button class="edit-btn">✏️ Upravit</button>
        <button class="delete-btn">🗑️ Smazat</button>
      </div>
    `;

    div.querySelector('.publish-btn').addEventListener('click', () => togglePublish(a.id, isPublic));
    div.querySelector('.edit-btn').addEventListener('click', () => editAkce(a));
    div.querySelector('.delete-btn').addEventListener('click', () => deleteAkce(a.id));

    container.appendChild(div);
  });
}

// =====================
// PUBLISH / UNPUBLISH
// =====================
function togglePublish(id, currentPublic) {
  const newPublic = currentPublic ? 0 : 1;

  fetch(`${API}/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ public: newPublic })
  })
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  })
  .then(() => {
    loadAkce();
  })
  .catch(err => {
    console.error('Chyba zveřejňování:', err);
  });
}

// =====================
// SUBMIT
// =====================
document.getElementById('akce-form').addEventListener('submit', e => {
  e.preventDefault();

  const data = {
    nazev: document.getElementById('nazev').value,
    datum: document.getElementById('datum').value,
    cas: document.getElementById('cas').value,
    misto: document.getElementById('misto').value,
    popis: document.getElementById('popis').value,
    public: editingId ? editingPublic : 0
  };

  const method = editingId ? 'PUT' : 'POST';
  const url = editingId ? `${API}/${editingId}` : API;

  fetch(url, {
    method: method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  })
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  })
  .then(() => {
    resetFormState(e.target);
    loadAkce();
  })
  .catch(err => {
    console.error('Chyba ukládání:', err);
  });
});

// =====================
// EDIT
// =====================
function editAkce(a) {
  editingId = a.id;
  editingPublic = isPublicEvent(a) ? 1 : 0;

  document.getElementById('nazev').value = a.nazev;
  document.getElementById('datum').value = a.datum;
  document.getElementById('cas').value = a.cas || '';
  document.getElementById('misto').value = a.misto || '';
  document.getElementById('popis').value = a.popis || '';

  document.getElementById('edit-info').style.display = 'block';
  document.getElementById('submit-btn').textContent = 'Uložit změny';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// =====================
// DELETE
// =====================
function deleteAkce(id) {
  if (!confirm('Opravdu smazat?')) return;

  fetch(`${API}/${id}`, { method: 'DELETE' })
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(() => {
      if (editingId === id) {
        resetFormState(document.getElementById('akce-form'));
      }
      loadAkce();
    })
    .catch(err => {
      console.error('Chyba mazání:', err);
    });
}

// =====================
// FORMAT
// =====================
function formatDate(d) {
  return new Date(`${d}T00:00`).toLocaleDateString('cs-CZ');
}
</script>

</body>
</html>

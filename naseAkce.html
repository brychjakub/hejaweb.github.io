<html lang="cs">
<head>
  <title>Naše akce | Heja Boys</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

  <link rel="stylesheet" href="assets/css/main.css" />
  <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
</head>

<body class="is-preload">
<div id="wrapper">

  <!-- HEADER -->
  <header id="header">
    <div class="inner">
      <a href="index.html" class="logo">
        <span class="symbol"><img src="images/logoFull.jpg" alt=""></span>
        <span class="title">Heja Boys</span>
      </a>
      <nav>
        <ul>
          <li><a href="#menu">Menu</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- MENU -->
  <nav id="menu">
    <h2>Menu</h2>
    <ul>
      <li><a href="index.html">Domů</a></li>
      <li><a href="aktuality.html">Aktuality</a></li>
      <li><a href="akce.html">Akce</a></li>
      <li><a href="naseAkce.html">Naše akce</a></li>
      <li><a href="alba.html">Alba</a></li>
      <li><a href="merch.html">Merch</a></li>
      <li><a href="onas.html">O nás</a></li>
    </ul>
  </nav>

  <!-- MAIN -->
  <div id="main">
    <div class="inner">

      <h1>Naše akce</h1>
      <p>Veřejný seznam akcí – kdokoliv může přidávat a upravovat.</p>

      <!-- FORMULÁŘ -->
      <section>
        <h2>Přidat / upravit akci</h2>

        <form id="akce-form">
          <input type="hidden" id="akce-id">

          <label>Název</label>
          <input type="text" id="nazev" required>

          <label>Datum</label>
          <input type="date" id="datum" required>

          <label>Čas</label>
          <input type="time" id="cas">

          <label>Místo</label>
          <input type="text" id="misto">

          <label>Popis</label>
          <textarea id="popis"></textarea>

          <button type="submit">Uložit akci</button>
        </form>
      </section>

      <hr>

      <!-- VÝPIS AKCÍ -->
      <section>
        <h2>Seznam akcí</h2>
        <ul id="akce-list" class="alt"></ul>
      </section>

    </div>
  </div>

</div>

<!-- SCRIPTS -->
<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/browser.min.js"></script>
<script src="assets/js/breakpoints.min.js"></script>
<script src="assets/js/util.js"></script>
<script src="assets/js/main.js"></script>

<script>
const API = 'https://hejaboys.pythonanywhere.com/api/akce';
let editingId = null;

loadAkce();

function loadAkce() {
  fetch(API)
    .then(r => r.json())
    .then(data => {
      const list = document.getElementById('akce-list');
      list.innerHTML = '';

      data.forEach(a => {
        list.innerHTML += `
          <li>
            <strong>${a.nazev}</strong><br>
            ${formatDate(a.datum)} — ${a.misto || ''} — ${a.cas || ''}<br>
            ${a.popis || ''}<br><br>
            <button onclick="editAkce(${a.id})">Upravit</button>
            <button onclick="deleteAkce(${a.id})">Smazat</button>
          </li>
        `;
      });
    });
}

document.getElementById('akce-form').onsubmit = e => {
  e.preventDefault();

  const data = {
    nazev: nazev.value,
    datum: datum.value,
    cas: cas.value,
    misto: misto.value,
    popis: popis.value
  };

  const method = editingId ? 'PUT' : 'POST';
  const url = editingId ? `${API}/${editingId}` : API;

  fetch(url, {
    method: method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(() => {
    e.target.reset();
    editingId = null;
    loadAkce();
  });
};

function editAkce(id) {
  fetch(API)
    .then(r => r.json())
    .then(data => {
      const a = data.find(x => x.id === id);
      if (!a) return;

      editingId = id;
      nazev.value = a.nazev;
      datum.value = a.datum;
      cas.value = a.cas;
      misto.value = a.misto;
      popis.value = a.popis;
    });
}

function deleteAkce(id) {
  if (!confirm('Opravdu smazat tuto akci?')) return;
  fetch(`${API}/${id}`, { method: 'DELETE' })
    .then(loadAkce);
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('cs-CZ');
}
</script>

</body>
</html>

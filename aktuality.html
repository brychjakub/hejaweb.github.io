			<div id="main">
				<div class="inner">
					<h1>Aktuality</h1>
					<p>Zde najdete nejnovější informace o koncertech, akcích a vydáních.</p>

					<section>
						<h2>Nejnovější</h2>
						<ul class="alt" id="next-event-container">
							<li id="next-event">
								<strong>Načítám...</strong>
							</li>
						</ul>
					</section>
				</div>
			</div>

		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/util.js"></script>
		<script src="assets/js/main.js"></script>
		<script src="assets/js/footer.js"></script>

		<script>
			const API = 'https://hejaboys.pythonanywhere.com/api/akce?public=true';

			loadNextEvent();

			function isPublicEvent(a) {
				return Number(a.public) === 1;
			}

			function toEventDate(a) {
				return new Date(`${a.datum}T${a.cas || '23:59'}`);
			}

			function parseLinks(text) {
				if (!text) return '';
				const urlRegex = /(https?:\/\/[^\s]+)/g;
				return text.replace(urlRegex, url => `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`);
			}

			function loadNextEvent() {
				fetch(API)
					.then(r => r.json())
					.then(data => {
						const now = new Date();
						const upcomingEvents = data
							.filter(a => isPublicEvent(a) && toEventDate(a) >= now)
							.sort((a, b) => toEventDate(a) - toEventDate(b));

						if (upcomingEvents.length === 0) {
							document.getElementById('next-event').innerHTML = `
								<strong>Brzy oznámíme</strong><br/>
								Sledujte tuto stránku pro nové akce.
							`;
							return;
						}

						const event = upcomingEvents[0];
						const eventDate = toEventDate(event);
						const dateStr = eventDate.toLocaleDateString('cs-CZ');
						const timeStr = event.cas ? ` — start ${event.cas}` : '';
						const location = event.misto ? ` — ${event.misto}` : '';

						document.getElementById('next-event').innerHTML = `
							<strong>${event.nazev}</strong><br/>
							${dateStr}${timeStr}${location}${event.popis ? '<br/>' + parseLinks(event.popis) : ''}<br/>
							<a href="akce.html">Více v Akcích</a>.
						`;
					})
					.catch(err => {
						console.error('Chyba:', err);
						document.getElementById('next-event').innerHTML = `
							<strong>Chyba načítání</strong><br/>
							Zkuste později.
						`;
					});
			}
		</script>
	</body>
</html>

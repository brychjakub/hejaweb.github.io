		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
		<link rel="icon" type="image/x-icon" href="images/favicon.ico">
	</head>
	<body class="is-preload">
		<div id="wrapper">
			<header id="header">
				<div class="inner">
					<a href="index.html" class="logo">
						<span class="symbol"><img src="images/logoFull.jpg" alt="" /></span><span class="title">Heja
                        Boys</span>
					</a>
					<nav>
						<ul>
							<li><a href="#menu">Menu</a></li>
						</ul>
					</nav>
				</div>
			</header>

			<nav id="menu">
				<h2>Menu</h2>
				<ul>
					<li><a href="index.html">Domů</a></li>
					<li><a href="aktuality.html">Aktuality</a></li>
					<li><a href="akce.html">Akce</a></li>
					<li><a href="alba.html">Alba</a></li>
					<li><a href="merch.html">Merch</a></li>

					<li><a href="naseAkce.html">Naše akce</a></li>
				</ul>
			</nav>

			<div id="main">
				<div class="inner">
					<h1>Aktuality</h1>
					<p>Zde najdete nejnovější informace o koncertech, akcích a vydáních.</p>

					<section>
						<h2>Aktuální akce</h2>
						<ul class="alt" id="next-event-container">
							<li id="next-event">
								<strong>Načítám...</strong>
							</li>
						</ul>
					</section>
				</div>
			</div>
		</div>

		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/util.js"></script>
		<script src="assets/js/main.js"></script>
		<script src="assets/js/footer.js"></script>
		<script src="assets/js/events-common.js"></script>

		<script>
			loadNextEvent();

			function loadNextEvent() {
				fetch(HejaEvents.PUBLIC_EVENTS_API)
					.then(r => r.json())
					.then(data => {
						const nextEvent = HejaEvents.publicUpcomingEvents(data)[0];

						if (!nextEvent) {
							document.getElementById('next-event').innerHTML = `
								<strong>Brzy oznámíme</strong><br/>
								Sledujte tuto stránku pro nové akce.
							`;
							return;
						}

						document.getElementById('next-event').innerHTML = HejaEvents.renderEventSummary(nextEvent, {
							timePrefix: ' — start ',
							locationPrefix: ' — ',
							ctaHref: 'akce.html',
							ctaText: 'Více v Akcích',
							ctaSuffix: '.'
						});
					})
					.catch(err => {
						console.error('Chyba:', err);
						document.getElementById('next-event').innerHTML = `
							<strong>Chyba načítání</strong><br/>
							Zkuste později.
						`;
					});
			}
		</script>
	</body>
</html>
